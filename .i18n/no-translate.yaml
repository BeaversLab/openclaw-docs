# Markdown i18n No-Translate Configuration
# This file specifies which terms and headings should NOT be translated

# Headings that should stay in English (exact match or pattern)
headings:
  # Product/Brand names
  - text: "Gateway"
    reason: "Core product name"

  - text: "OpenClaw"
    reason: "Product name"

  # Industry standard terms
  - text: "API"
    reason: "Industry standard term"

  - text: "CLI"
    reason: "Industry standard term"

  - text: "OAuth"
    reason: "Industry standard protocol"

  - text: "TUI"
    reason: "Technical term"

  - text: "IPC"
    reason: "Technical term"

  - text: "RPC"
    reason: "Technical term"

  - text: "GCP"
    reason: "Platform name"

  - text: "LLM"
    reason: "Industry standard term"

  # Pattern matching
  - pattern: ".*CLI.*"
    reason: "CLI-related headings"

  - pattern: ".*API.*"
    reason: "API-related headings"

