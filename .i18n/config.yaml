batchTokens: 500
parallelBatches: 3
languages:
  - zh
  - zh-Hant
  - fr
  - es

collect:
  exclude:
    - .i18n/**
    - ja-JP/**
    - zh-CN/**
    - .generated/**
    - .i18n/*.tm.jsonl

formatSafety:
  jsx:
    translatableAttrs:
      - title
      - alt
      - aria-label
      - data-title
      - summary
      - icon

provider:
  baseUrl: https://open.bigmodel.cn/api/coding/paas/v4
  model: glm-4.7
  timeoutMs: 300000

linkFix:
  rules:
    - dir: /en
      prefix: en/
    - dir: /fr
      prefix: fr/
    - dir: /zh
      prefix: zh/
    - dir: /es
      prefix: es/
    - dir: /zh-Hant
      prefix: zh-Hant/
