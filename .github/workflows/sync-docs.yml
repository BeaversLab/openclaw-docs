name: Sync Docs from OpenClaw

on:
  schedule:
    - cron: '0 13 * * *' # Daily at 21:00 CST (UTC+8)
  workflow_dispatch: # Manual trigger

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout crawfish-docs
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Get latest tag and check against recorded version
        run: |
          LATEST_TAG=$(git ls-remote --tags https://github.com/openclaw/openclaw.git | awk '{print $2}' | grep '^refs/tags/v[0-9]' | sed 's|refs/tags/||' | grep -v '\^{}' | sort -V | tail -1)
          CURRENT_TAG=$(grep "var TAG =" version.js | sed 's/.*var TAG = "\(.*\)";/\1/')
          if [[ -n "$LATEST_TAG" && "$LATEST_TAG" != "$CURRENT_TAG" ]]; then
            echo "OPENCLAW_TAG=$LATEST_TAG" >> $GITHUB_ENV
            echo "SYNC_DATE=$(date +'%Y-%m-%d')" >> $GITHUB_ENV
            echo "SHOULD_SYNC=true" >> $GITHUB_ENV
          else
            echo "Skipping sync: latest tag=$LATEST_TAG, recorded tag=$CURRENT_TAG"
            echo "SHOULD_SYNC=false" >> $GITHUB_ENV
          fi

      - name: Clone openclaw/openclaw at tag
        if: env.SHOULD_SYNC == 'true'
        run: |
          git clone --depth 1 --branch ${{ env.OPENCLAW_TAG }} https://github.com/openclaw/openclaw.git openclaw-repo
          cd openclaw-repo
          echo "OPENCLAW_COMMIT=$(git rev-parse HEAD)" >> $GITHUB_ENV

      - name: Update version.js
        if: env.SHOULD_SYNC == 'true'
        run: |
          sed -i "s/var TAG = \".*\";/var TAG = \"${{ env.OPENCLAW_TAG }}\";/" version.js
          sed -i "s/var UPDATED_AT = \".*\";/var UPDATED_AT = \"${{ env.SYNC_DATE }}\";/" version.js
          sed -i "s/var COMMIT = \".*\";/var COMMIT = \"${{ env.OPENCLAW_COMMIT }}\";/" version.js

      - name: Sync docs and assets
        if: env.SHOULD_SYNC == 'true'
        run: |
          mkdir -p src/content/docs/en public/assets public/images public

          # Sync shared assets
          rsync -av openclaw-repo/docs/assets/ public/assets/
          rsync -av openclaw-repo/docs/images/ public/images/

          # Sync top-level image files into public/
          find openclaw-repo/docs -maxdepth 1 -type f \( -iname '*.jpg' -o -iname '*.png' \) -exec rsync -av {} public/ \;

          # Sync remaining docs into the English docs tree.
          # Do not use --delete to avoid removing local project-specific content.
          rsync -av \
            --exclude 'assets' \
            --exclude 'images' \
            --exclude 'ja-JP' \
            --exclude 'zh-CN' \
            --exclude '.generated' \
            --exclude '.i18n/*.tm.jsonl' \
            --exclude '*.jpg' \
            --exclude '*.png' \
            openclaw-repo/docs/ src/content/docs/en/

      - name: Fix MDX compatibility in src/content/docs/en/
        if: env.SHOULD_SYNC == 'true'
        run: |
          node scripts/fix-mdx-compat.js src/content/docs/en/

      - name: Fix internal links in src/content/docs/en/
        if: env.SHOULD_SYNC == 'true'
        run: |
          node scripts/fix-locale-links.js src/content/docs/en/

      - name: Commit and push changes
        if: env.SHOULD_SYNC == 'true'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add src/content/docs/en/ public/assets/ public/images/ public/*.jpg public/*.png version.js
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: sync docs from openclaw/openclaw ${{ env.SYNC_DATE }}" -m "Version: ${{ env.OPENCLAW_TAG }}"
            git push
          fi

      - name: Create and push version tag
        if: env.SHOULD_SYNC == 'true' && env.OPENCLAW_TAG != ''
        run: |
          if git rev-parse --verify "${{ env.OPENCLAW_TAG }}" >/dev/null 2>&1; then
            if [[ "$(git rev-parse ${{ env.OPENCLAW_TAG }})" == "$(git rev-parse HEAD)" ]]; then
              echo "Tag ${{ env.OPENCLAW_TAG }} already exists and points to HEAD, skipping"
              exit 0
            fi
          fi
          git tag -a "${{ env.OPENCLAW_TAG }}" -m "Docs for OpenClaw ${{ env.OPENCLAW_TAG }}"
          git push origin "${{ env.OPENCLAW_TAG }}"

      - name: Cleanup
        if: always()
        run: rm -rf openclaw-repo
